<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-label="Grok Remote Hub">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="50%" stop-color="#0f1318"/>
      <stop offset="100%" stop-color="#121018"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e6b84d"/>
      <stop offset="100%" stop-color="#c4891a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151b24"/>
      <stop offset="100%" stop-color="#0f1318"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#243041" stroke-opacity="0.55" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#grid)" opacity="0.45"/>
  <circle cx="1120" cy="60" r="160" fill="#e6b84d" fill-opacity="0.07" filter="url(#soft)"/>
  <circle cx="160" cy="380" r="140" fill="#5ec8e8" fill-opacity="0.05"/>

  <!-- desktop shell -->
  <rect x="64" y="72" width="720" height="276" rx="14" fill="url(#panel)" stroke="#243041" stroke-width="1.5"/>
  <rect x="64" y="72" width="720" height="36" rx="14" fill="#0a0c10"/>
  <rect x="64" y="94" width="720" height="14" fill="#0a0c10"/>
  <circle cx="86" cy="90" r="5" fill="#f07178"/><circle cx="104" cy="90" r="5" fill="#e6b84d"/><circle cx="122" cy="90" r="5" fill="#6dca8d"/>
  <rect x="80" y="122" width="168" height="208" rx="8" fill="#0a0c10" stroke="#243041"/>
  <rect x="92" y="136" width="72" height="10" rx="3" fill="#e6b84d"/>
  <rect x="92" y="160" width="144" height="28" rx="6" fill="#151b24" stroke="#243041"/>
  <rect x="100" y="168" width="96" height="8" rx="2" fill="#d6deea"/>
  <rect x="100" y="180" width="64" height="6" rx="2" fill="#7d8b9c"/>
  <rect x="92" y="200" width="144" height="28" rx="6" fill="#0f1318" stroke="#243041"/>
  <rect x="100" y="208" width="88" height="8" rx="2" fill="#d6deea" opacity="0.75"/>
  <rect x="92" y="240" width="144" height="28" rx="6" fill="#0f1318" stroke="#243041"/>
  <rect x="100" y="248" width="100" height="8" rx="2" fill="#d6deea" opacity="0.55"/>
  <rect x="264" y="122" width="500" height="208" rx="8" fill="#0a0c10" stroke="#243041"/>
  <rect x="284" y="148" width="280" height="12" rx="3" fill="#5ec8e8" fill-opacity="0.35"/>
  <rect x="284" y="176" width="420" height="10" rx="3" fill="#d6deea" fill-opacity="0.14"/>
  <rect x="284" y="198" width="380" height="10" rx="3" fill="#d6deea" fill-opacity="0.10"/>
  <rect x="284" y="220" width="440" height="10" rx="3" fill="#e6b84d" fill-opacity="0.22"/>
  <rect x="284" y="242" width="300" height="10" rx="3" fill="#d6deea" fill-opacity="0.10"/>
  <rect x="284" y="280" width="460" height="32" rx="8" fill="#151b24" stroke="#243041"/>
  <circle cx="304" cy="296" r="5" fill="#6dca8d"/>
  <rect x="320" y="290" width="160" height="12" rx="3" fill="#7d8b9c"/>

  <!-- phone -->
  <rect x="860" y="88" width="168" height="280" rx="26" fill="#0a0c10" stroke="#243041" stroke-width="3"/>
  <rect x="874" y="116" width="140" height="216" rx="10" fill="#0f1318"/>
  <rect x="888" y="132" width="70" height="8" rx="2" fill="#e6b84d"/>
  <rect x="888" y="156" width="112" height="36" rx="8" fill="#151b24" stroke="#243041"/>
  <rect x="888" y="204" width="112" height="36" rx="8" fill="#151b24" stroke="#243041"/>
  <rect x="888" y="252" width="112" height="36" rx="8" fill="#151b24" stroke="#243041"/>
  <rect x="916" y="342" width="56" height="5" rx="2.5" fill="#243041"/>

  <!-- link -->
  <path d="M784 210 C820 210, 830 220, 860 228" fill="none" stroke="url(#amber)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M784 240 C820 240, 830 250, 860 258" fill="none" stroke="#5ec8e8" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>

  <text x="64" y="48" fill="#e6b84d" font-family="IBM Plex Sans, Segoe UI, system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="3.5">GROK BUILD · REMOTE CONTROL</text>
  <text x="64" y="388" fill="#d6deea" font-family="IBM Plex Sans, Segoe UI, system-ui, sans-serif" font-size="34" font-weight="600">Grok Remote Hub</text>
  <text x="560" y="388" fill="#7d8b9c" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="15">Tailscale · live stream · phone + desktop</text>
</svg>
